<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>辽宁省政府下属机构 - 中国政府机关介绍</title>
    <link rel="stylesheet" href="../styles.css">
    <style>
        .dept-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin: 20px 0; }
        .dept-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-left: 5px solid #3498db; }
        .dept-card h4 { color: #3498db; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid #eee; }
        .dept-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #eee; font-size: 14px; }
        .stat-row { display: flex; gap: 15px; margin: 20px 0; flex-wrap: wrap; }
        .stat-box { flex: 1; min-width: 150px; background: linear-gradient(135deg, #3498db, #2980b9); color: white; padding: 20px; border-radius: 10px; text-align: center; }
        .stat-number { font-size: 28px; font-weight: bold; }
    </style>
</head>
<body>
<div id="sidebar-container"></div>
<script src="../app.js" defer></script>
<main class="main-content" style="margin-left: var(--sidebar-width);">
        <div class="content-wrapper">
            <header class="hero-section">
                <h1>辽宁省人民政府下属机构</h1>
                <p>省级政府 · 省政府组成部门</p>
            </header>
            <section id="overview" class="gov-section">
                <h2>📊 辽宁省基本情况</h2>
                <div class="stat-row">
                    <div class="stat-box">
                        <div class="stat-number">4,169万</div>
                        <div>常住人口</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number">3.0万亿+</div>
                        <div>GDP(元)</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number">35个</div>
                        <div>组成部门</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number">14市</div>
                        <div>行政区划</div>
                    </div>
                </div>
            </section>
            <section id="economy" class="gov-section">
                <h2>💰 经济发展部门</h2>
                <div class="dept-grid">
                    <div class="dept-card">
                        <h4>📈 <a href="liaoning-fagai.html" style="color:inherit;text-decoration:none;">发展和改革委员会</a></h4>
                        <div class="dept-item"><span>主要职责</span><span>宏观经济管理、重大项目审批</span></div>
                        <div class="dept-item"><span>2026重点</span><span>东北振兴</span></div>
                        <div class="dept-item"><span>人员编制</span><span>200人</span></div>
                        <div class="dept-item"><span>下属机构</span><span>15个处室</span></div>
                        <div style="margin-top:10px;"><a href="liaoning-fagai.html" class="btn-link" style="font-size:12px;">查看详情 →</a></div>
                    </div>
                </div>
            </section>
            <div class="back-to-home">
                <a href="../index.html" class="btn-back">← 返回首页</a>
            </div>
        </div>
    </main>
</body>
</html>
