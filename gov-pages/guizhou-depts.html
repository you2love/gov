<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贵州省政府下属机构 - 中国政府机关介绍</title>
    <link rel="stylesheet" href="../styles.css">
    <style>
        .stat-row { display: flex; gap: 15px; margin: 20px 0; flex-wrap: wrap; }
        .stat-box { flex: 1; min-width: 150px; background: linear-gradient(135deg, #9b59b6, #8e44ad); color: white; padding: 20px; border-radius: 10px; text-align: center; }
        .stat-number { font-size: 28px; font-weight: bold; }
    </style>
</head>
<body>
<div id="sidebar-container"></div>
<script src="../app.js" defer></script>
<main class="main-content" style="margin-left: var(--sidebar-width);">
        <div class="content-wrapper">
            <header class="hero-section">
                <h1>贵州省人民政府下属机构</h1>
                <p>省级政府 · 省政府组成部门</p>
            </header>
            <section id="overview" class="gov-section">
                <h2>📊 贵州省基本情况</h2>
                <div class="stat-row">
                    <div class="stat-box">
                        <div class="stat-number">3,854万</div>
                        <div>常住人口</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number">2.2万亿+</div>
                        <div>GDP(元)</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number">32个</div>
                        <div>组成部门</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number">9市</div>
                        <div>行政区划</div>
                    </div>
                </div>
            </section>
            <div class="back-to-home">
                <a href="../index.html" class="btn-back">← 返回首页</a>
            </div>
        </div>
    </main>
</body>
</html>
